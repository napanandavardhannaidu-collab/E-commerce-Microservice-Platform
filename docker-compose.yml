services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongodb_data:/data/db
    networks:
      - shopsphere-network

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - shopsphere-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - shopsphere-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
      JWT_SECRET: mySecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm2024
    depends_on:
      - mongodb
      - redis
    networks:
      - shopsphere-network

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
      ELASTICSEARCH_URI: http://elasticsearch:9200
    depends_on:
      - mongodb
      - redis
      - elasticsearch
    networks:
      - shopsphere-network
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
      PRODUCT_SERVICE_URL: http://product-service:8081
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
    depends_on:
      - mongodb
      - redis
      - product-service
      - notification-service
    networks:
      - shopsphere-network

  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    container_name: cart-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
    depends_on:
      - mongodb
      - redis
    networks:
      - shopsphere-network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
      STRIPE_SECRET_KEY: your_stripe_secret_key_here
    depends_on:
      - mongodb
      - redis
    networks:
      - shopsphere-network

  shipping-service:
    build:
      context: ./shipping-service
      dockerfile: Dockerfile
    container_name: shipping-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
    depends_on:
      - mongodb
      - redis
    networks:
      - shopsphere-network   
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
    depends_on:
      - mongodb
      - redis
    networks:
      - shopsphere-network

  review-service:
    build:
      context: ./review-service
      dockerfile: Dockerfile
    container_name: review-service
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
    depends_on:
      - mongodb
      - redis
    networks:
      - shopsphere-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: mySecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm2024
      USER_SERVICE_URL: http://user-service:8083
      PRODUCT_SERVICE_URL: http://product-service:8081
      ORDER_SERVICE_URL: http://order-service:8082
      CART_SERVICE_URL: http://cart-service:8084
      PAYMENT_SERVICE_URL: http://payment-service:8085
      SHIPPING_SERVICE_URL: http://shipping-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      REVIEW_SERVICE_URL: http://review-service:8088
    depends_on:
      - user-service
      - product-service
      - order-service
      - cart-service
      - payment-service
      - shipping-service
      - notification-service
      - review-service
    networks:
      - shopsphere-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - shopsphere-network

volumes:
  mongodb_data:

networks:
  shopsphere-network:
    driver: bridge      

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: shopsphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: e-commerce-microservice-platform-cart-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: cart-config
            - secretRef:
                name: cart-secret

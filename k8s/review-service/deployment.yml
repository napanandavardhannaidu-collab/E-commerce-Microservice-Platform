apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
  namespace: shopsphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-service
  template:
    metadata:
      labels:
        app: review-service
    spec:
      containers:
        - name: review-service
          image: e-commerce-microservice-platform-review-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8088
          envFrom:
            - configMapRef:
                name: review-config
            - secretRef:
                name: review-secret
